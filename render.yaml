services:
  - type: web
    name: sixbeans-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: sixbeans-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://sixbeans.onrender.com
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GODADDY_API_KEY
        sync: false
      - key: GODADDY_API_SECRET
        sync: false

  # Nightly ingestion cron — runs the analytics pipeline (GoDaddy scrape,
  # TapMango orders scrape, TapMango API pull, DoorDash gmail fetch).
  # Uses a Playwright-capable Docker image so Chromium works in the cron env.
  - type: cron
    name: sixbeans-ingest
    runtime: docker
    region: oregon
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile.ingest
    # 9 PM Pacific = 05:00 UTC (PDT) / 04:00 UTC (PST).
    # Cron time is UTC; 0 5 = 10 PM PDT / 9 PM PST. Render treats this as UTC.
    schedule: "0 5 * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sixbeans-db
          property: connectionString
      # All of these are set once on the web service and shared here via
      # a Render Environment Group (create in dashboard: Settings > Env Groups).
      # Until the group is set up, duplicate the values manually.
      - key: TAPMANGO_API_KEY
        sync: false
      - key: SCRAPER_SESSION_ENCRYPTION_KEY
        sync: false
      - key: GMAIL_OAUTH_CLIENT_ID
        sync: false
      - key: GMAIL_OAUTH_CLIENT_SECRET
        sync: false
      - key: GMAIL_OAUTH_REDIRECT_URI
        sync: false
      - key: DOORDASH_REPORT_FROM_EMAIL
        value: no-reply@doordash.com
      - key: DOORDASH_REPORT_INBOX
        sync: false
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: JWT_SECRET_KEY
        sync: false

  - type: web
    name: sixbeans
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://sixbeans-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sixbeans-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
