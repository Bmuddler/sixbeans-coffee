services:
  - type: web
    name: sixbeans-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: sixbeans-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://sixbeans.onrender.com
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GODADDY_API_KEY
        sync: false
      - key: GODADDY_API_SECRET
        sync: false

  # Daily analytics health check — emails the owner if yesterday's
  # GoDaddy or TapMango Orders failed to sync. Uses the same Gmail
  # OAuth refresh token as the DoorDash watcher (new gmail.send scope
  # means the owner must re-consent on the Analytics Admin page once
  # after this deploy).
  - type: cron
    name: sixbeans-analytics-alerter
    runtime: docker
    region: oregon
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile.ingest
    # 15:00 UTC = 8:00 AM PDT / 7:00 AM PST.
    schedule: "0 15 * * *"
    dockerCommand: python -m scripts.alert_if_missing
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sixbeans-db
          property: connectionString
      - key: SCRAPER_SESSION_ENCRYPTION_KEY
        sync: false
      - key: GMAIL_OAUTH_CLIENT_ID
        sync: false
      - key: GMAIL_OAUTH_CLIENT_SECRET
        sync: false
      - key: GMAIL_OAUTH_REDIRECT_URI
        sync: false
      - key: ANALYTICS_ALERT_RECIPIENT
        value: logcastles@gmail.com

  - type: web
    name: sixbeans
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://sixbeans-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sixbeans-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
